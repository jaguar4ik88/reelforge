services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stack_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/storage:/var/www/storage
    environment:
      - APP_ENV=local
    depends_on:
      - mysql
      - redis
    networks:
      - stack

  nginx:
    image: nginx:alpine
    container_name: stack_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - stack

  mysql:
    image: mysql:8.0
    container_name: stack_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - stack

  redis:
    image: redis:alpine
    container_name: stack_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - stack

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stack_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - stack

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stack_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - stack

networks:
  stack:
    driver: bridge

volumes:
  mysql_data:
