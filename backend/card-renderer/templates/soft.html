<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: {{CANVAS_WIDTH}}px;
      height: {{CANVAS_HEIGHT}}px;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      --accent: {{ACCENT}};
    }
    .card {
      width: {{CANVAS_WIDTH}}px;
      height: {{CANVAS_HEIGHT}}px;
      position: relative;
      overflow: hidden;
      background: #1a1a22;
    }
    .card .product-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      z-index: 0;
    }
    .scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,15,22,0.55) 0%, rgba(15,15,22,0.25) 35%, rgba(15,15,22,0.45) 100%);
      pointer-events: none;
      z-index: 1;
    }
    .head {
      position: absolute;
      top: 4%;
      left: 5%;
      right: 5%;
      text-align: center;
      z-index: 4;
    }
    .title {
      font-weight: 900;
      font-size: calc({{CANVAS_WIDTH}}px * 0.058);
      line-height: 1.08;
      color: #f5f5f5;
      word-wrap: break-word;
      text-shadow: 0 2px 14px rgba(0,0,0,0.45);
    }
    .sub {
      margin-top: 0.4rem;
      font-weight: 700;
      font-size: calc({{CANVAS_WIDTH}}px * 0.026);
      color: rgba(255,255,255,0.88);
      word-wrap: break-word;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }
    .badge-row-mid {
      position: absolute;
      top: 36%;
      left: 4%;
      right: 4%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 3%;
      z-index: 5;
    }
    .badge-col { display: flex; flex-direction: column; gap: 0.55rem; max-width: 42%; }
    .badge-col.right { align-items: flex-end; text-align: right; }
    .pill {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-weight: 700;
      font-size: calc({{CANVAS_WIDTH}}px * 0.028);
      border-radius: 6px;
      border-left: 4px solid var(--accent);
      backdrop-filter: blur(8px);
      max-width: 100%;
      word-wrap: break-word;
    }
    .badge-col.right .pill {
      border-left: none;
      border-right: 4px solid var(--accent);
    }
    .price-bar {
      position: absolute;
      left: 4%;
      right: 4%;
      bottom: 4%;
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      z-index: 4;
    }
    .price { font-weight: 900; font-size: calc({{CANVAS_WIDTH}}px * 0.042); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .price-old { font-size: calc({{CANVAS_WIDTH}}px * 0.028); color: rgba(255,255,255,0.72); text-decoration: line-through; margin-left: 0.35rem; }
  </style>
</head>
<body>
  <div class="card">
    {{PRODUCT_IMAGE}}
    <div class="scrim"></div>
    <div class="head">
      <div class="title">{{TITLE}}</div>
      <div class="sub">{{DESC}}</div>
    </div>
    <div class="badge-row-mid">
      <div class="badge-col left">
        <span class="pill">{{BADGE_1}}</span>
        <span class="pill">{{BADGE_2}}</span>
      </div>
      <div class="badge-col right">
        <span class="pill">{{BADGE_3}}</span>
        <span class="pill">{{BADGE_4}}</span>
      </div>
    </div>
    <div class="price-bar">
      <span>
        <span class="price">{{PRICE}}</span>
        <span class="price-old">{{PRICE_OLD}}</span>
      </span>
    </div>
  </div>
</body>
</html>
