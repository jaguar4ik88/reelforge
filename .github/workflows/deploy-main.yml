# Deploy when `main` is updated (push or merge).
# Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH (required).
# Optional: DEPLOY_PATH_B — second repo root on the same host (second site / folder).

name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH_B="${{ secrets.DEPLOY_PATH_B }}"
            cd "$DEPLOY_PATH"
            bash scripts/deploy.sh
            if [ -n "${DEPLOY_PATH_B}" ]; then
              cd "$DEPLOY_PATH_B"
              bash scripts/deploy.sh
            fi
